name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-packages --group dev

      - name: Lint
        run: uv run ruff check packages/anomx services/api services/dashboard services/orchestrator

      - name: Type check
        run: uv run mypy packages/anomx/anomx

      - name: Test
        run: uv run pytest
