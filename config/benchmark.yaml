seed: 42

dataset:
  type: synthetic
  n_samples: 1000
  n_anomalies: 50
  anomaly_types: [point, contextual, drift]
  interval_seconds: 60
  base_value: 20.0

evaluation:
  fit_ratio: 0.8
  calibration:
    method: percentile
    percentile: 95.0

detectors:
  - name: mad
    type: mad
    weight: 0.5
    params:
      value_key: value

  - name: isolation_forest
    type: isolation_forest
    weight: 0.5
    params:
      feature_keys: [value]
      contamination: 0.05
      random_state: 42

output:
  directory: reports
  prefix: benchmark
