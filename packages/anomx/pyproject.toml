[project]
name = "anomx"
version = "0.1.0"
description = "Pluggable anomaly detection engine for time series and tabular data"
readme = "README.md"
requires-python = ">=3.11,<3.12"
license = { text = "MIT" }
authors = [{ name = "Idris" }]
dependencies = [
    "pydantic>=2.0,<3",
    "structlog>=24.0",
    "polars>=1.0",
    "pandera>=0.20",
    "psycopg[binary]>=3.2",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.6",
    "mypy>=1.11",
]

[project.scripts]
anomx = "anomx.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["anomx"]

[tool.mypy]
python_version = "3.11"
strict = true
packages = ["anomx"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: tests requiring PostgreSQL (docker compose up)",
]
